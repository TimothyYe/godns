name: Auto CI
on: [push, pull_request]

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build frontend and generate
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
          cd ..
          go generate ./...
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated
          path: internal/server/out
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated
          path: internal/server/out
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated
          path: internal/server/out
      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
